<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 金門迎城隍 - 即時定位系統</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        .control-panel {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(255,255,255,0.98); border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            width: 280px; transition: all 0.3s ease;
            max-height: 90vh; display: flex; flex-direction: column;
        }

        .control-panel.minimized { width: 140px; height: 40px; overflow: hidden; }

        .panel-header {
            padding: 10px; display: flex; justify-content: space-between; align-items: center;
            background: #d32f2f; color: white; border-radius: 12px 12px 0 0; cursor: pointer;
        }

        .panel-content { padding: 10px; overflow-y: auto; }
        .control-panel.minimized .panel-content { display: none; }

        button { width: 100%; padding: 8px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; margin-bottom: 5px; }
        .btn-toggle { background: none; color: white; width: auto; margin: 0; padding: 2px 5px; font-size: 12px; border: 1px solid white; }
        .btn-user { background: #2196F3; color: white; }
        .btn-admin { background: #FF9800; color: white; font-size: 13px; }
        
        .status-info { font-size: 11px; margin: 5px 0; text-align: center; color: #666; }

        .report-section { margin-top: 12px; padding-top: 8px; border-top: 2px solid #eee; position: relative; }
        .report-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .report-title { font-size: 14px; font-weight: bold; color: #333; }
        
        .btn-reset { 
            width: auto; padding: 2px 8px; font-size: 11px; 
            background: #f5f5f5; color: #999; border: 1px solid #ddd; margin: 0;
        }
        .btn-reset:active { background: #eee; color: #d32f2f; }

        .btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .report-item { display: flex; flex-direction: column; align-items: center; margin-bottom: 6px; }
        
        .btn-report { padding: 8px 2px; font-size: 12px; background: #fdfdfd; border: 1px solid #ddd; width: 100%; margin: 0; }
        .btn-arrived { border-left: 4px solid #4CAF50; }
        .btn-left { border-left: 4px solid #f44336; }
        
        .time-label { 
            font-size: 16px; color: #d32f2f; font-weight: 900; 
            margin-top: 3px; letter-spacing: 1px; font-family: Arial, sans-serif;
            height: 20px;
        }

        .god-marker {
            display: flex; justify-content: center; align-items: center;
            width: 40px; height: 40px; background: white;
            border: 2px solid #d32f2f; border-radius: 50%;
            font-size: 24px; box-shadow: 0 0 10px rgba(0,0,0,0.3);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0px rgba(211, 47, 47, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(211, 47, 47, 0); }
            100% { box-shadow: 0 0 0 0px rgba(211, 47, 47, 0); }
        }
    </style>
</head>
<body>

<div id="mainPanel" class="control-panel">
    <div class="panel-header" onclick="togglePanel()">
        <span style="font-size: 14px; font-weight: bold;">👮‍♂️20260528金門迎城隍勤務</span>
        <button class="btn-toggle" id="toggleBtn">收合</button>
    </div>
    
    <div class="panel-content">
        <button class="btn-user" onclick="locateUser()">📍 隊伍尾位置</button>
        <button id="adminBtn" class="btn-admin" onclick="toggleAdminMode()">📡 開啟神轎定位</button>
        <div id="statusText" class="status-info">讀取中...</div>

        <!-- 蒞轄區塊 -->
        <div class="report-section">
            <div class="report-header">
                <span class="report-title">📌 蒞轄</span>
                <button class="btn-reset" onclick="resetSection('蒞')">清空時間</button>
            </div>
            <div class="btn-grid">
                <div class="report-item"><button class="btn-report btn-arrived" onclick="reportStatus('縣長', '蒞轄')">縣長</button><span id="time-縣長-蒞" class="time-label">--:--</span></div>
                <div class="report-item"><button class="btn-report btn-arrived" onclick="reportStatus('副縣長李', '蒞轄')">李副縣長</button><span id="time-副縣長李-蒞" class="time-label">--:--</span></div>
                <div class="report-item"><button class="btn-report btn-arrived" onclick="reportStatus('副縣長陳', '蒞轄')">陳副縣長</button><span id="time-副縣長陳-蒞" class="time-label">--:--</span></div>
                <div class="report-item"><button class="btn-report btn-arrived" onclick="reportStatus('議長', '蒞轄')">議長</button><span id="time-議長-蒞" class="time-label">--:--</span></div>
                <div class="report-item"><button class="btn-report btn-arrived" onclick="reportStatus('副議長', '蒞轄')">副議長</button><span id="time-副議長-蒞" class="time-label">--:--</span></div>
            </div>
        </div>

        <!-- 離轄區塊 -->
        <div class="report-section">
            <div class="report-header">
                <span class="report-title">🚶 離轄</span>
                <button class="btn-reset" onclick="resetSection('離')">清空時間</button>
            </div>
            <div class="btn-grid">
                <div class="report-item"><button class="btn-report btn-left" onclick="reportStatus('縣長', '離轄')">縣長</button><span id="time-縣長-離" class="time-label">--:--</span></div>
                <div class="report-item"><button class="btn-report btn-left" onclick="reportStatus('副縣長李', '離轄')">李副縣長</button><span id="time-副縣長李-離" class="time-label">--:--</span></div>
                <div class="report-item"><button class="btn-report btn-left" onclick="reportStatus('副縣長陳', '離轄')">陳副縣長</button><span id="time-副縣長陳-離" class="time-label">--:--</span></div>
                <div class="report-item"><button class="btn-report btn-left" onclick="reportStatus('議長', '離轄')">議長</button><span id="time-議長-離" class="time-label">--:--</span></div>
                <div class="report-item"><button class="btn-report btn-left" onclick="reportStatus('副議長', '離轄')">副議長</button><span id="time-副議長-離" class="time-label">--:--</span></div>
            </div>
        </div>
    </div>
</div>

<div id="map"></div>

    ];

    // 2. 地圖初始化 (聚焦在金門城隍廟附近)
    const map = L.map('map', { zoomControl: false }).setView([24.4325, 118.3160], 17);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    L.polyline(routePoints, { color: "#d32f2f", weight: 6, opacity: 0.3 }).addTo(map);
    const passedPath = L.polyline([], { color: "#555", weight: 4, dashArray: "5, 8", opacity: 0.8 }).addTo(map);
    const godIcon = L.divIcon({ html: '<div class="god-marker">👨‍⚖️</div>', className: '', iconSize: [40, 40], iconAnchor: [20, 20] });
    const palanquinMarker = L.marker(routePoints[0], { icon: godIcon }).addTo(map);

    function togglePanel() {
        const panel = document.getElementById('mainPanel');
        const btn = document.getElementById('toggleBtn');
        panel.classList.toggle('minimized');
        btn.innerText = panel.classList.contains('minimized') ? "展開" : "收合";
    }

    // 3. Firebase 初始化
    const firebaseConfig = {
        apiKey: "AIzaSyAWtgeRkdjtaHdtnoKdgOMQ_PTBMpwmsLI", 
        databaseURL: "https://kinmen-location-default-rtdb.firebaseio.com",
        projectId: "kinmen-location"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 4. 神轎定位邏輯
    function syncPalanquin(lat, lng) {
        const currentPos = L.latLng(lat, lng);
        let minDist = Infinity, closestIdx = 0;
        routePoints.forEach((p, i) => {
            let d = L.latLng(p).distanceTo(currentPos);
            if(d < minDist) { minDist = d; closestIdx = i; }
        });
        passedPath.setLatLngs(routePoints.slice(0, closestIdx + 1));
        palanquinMarker.setLatLng(routePoints[closestIdx]);
    }

    db.ref('palanquin/location').on('value', (s) => {
        const d = s.val();
        if(d) {
            syncPalanquin(d.lat, d.lng);
            document.getElementById('statusText').innerText = "最後更新: " + new Date(d.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
    });

    function locateUser() { map.locate({setView: true, maxZoom: 17}); }

    let isAdmin = false, watchId = null;
    function toggleAdminMode() {
        if (!isAdmin) {
            if (confirm("啟動發送定位？")) {
                isAdmin = true;
                document.getElementById('adminBtn').innerText = "🛑 停止發送";
                document.getElementById('adminBtn').style.background = "#f44336";
                watchId = navigator.geolocation.watchPosition((p) => {
                    db.ref('palanquin/location').set({ lat: p.coords.latitude, lng: p.coords.longitude, timestamp: Date.now() });
                }, null, { enableHighAccuracy: true });
            }
        } else {
            isAdmin = false;
            document.getElementById('adminBtn').innerText = "📡 開啟神轎定位";
            document.getElementById('adminBtn').style.background = "#FF9800";
            navigator.geolocation.clearWatch(watchId);
        }
    }

    // 5. 長官回報與重置
    function reportStatus(person, action) {
        if (!confirm(`確認更新 ${person} 的${action}時間？`)) return;
        const key = action === '蒞轄' ? '蒞' : '離';
        db.ref(`officials/${person}/${key}`).set({
            timestamp: Date.now()
        });
    }

    function resetSection(key) {
        const actionName = key === '蒞' ? '蒞轄' : '離轄';
        if (!confirm(`確定要清空所有長官的「${actionName}」時間嗎？`)) return;
        
        db.ref('officials').once('value', (s) => {
            const data = s.val();
            if(!data) return;
            Object.keys(data).forEach(person => {
                db.ref(`officials/${person}/${key}`).remove();
            });
        });
    }

    db.ref('officials').on('value', (s) => {
        const d = s.val() || {};
        const officials = ['縣長', '副縣長李', '副縣長陳', '議長', '副議長'];
        const keys = ['蒞', '離'];

        officials.forEach(p => {
            keys.forEach(k => {
                const el = document.getElementById(`time-${p}-${k}`);
                if (!el) return;

                if (d[p] && d[p][k] && d[p][k].timestamp) {
                    const t = new Date(d[p][k].timestamp);
                    const hh = String(t.getHours()).padStart(2, '0');
                    const mm = String(t.getMinutes()).padStart(2, '0');
                    
                    if (el.innerText === "--:--") {
                        el.style.color = "#2196F3";
                        setTimeout(() => { el.style.color = "#d32f2f"; }, 800);
                    }
                    el.innerText = `${hh}:${mm}`;
                } else {
                    el.innerText = "--:--";
                    el.style.color = "#d32f2f";
                }
            });
        });
    });

</html>
