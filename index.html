<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金門迎城隍 - 神轎即時定位</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; }
        #map { height: 100vh; width: 100%; background: #e0e0e0; }
        .control-panel {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(255,255,255,0.95); padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 180px;
        }
        button {
            width: 100%; padding: 12px; margin-top: 8px; cursor: pointer;
            border: none; border-radius: 6px; font-weight: bold; font-size: 14px;
        }
        .btn-user { background: #2196F3; color: white; }
        .btn-admin { background: #FF9800; color: white; }
        .status { font-size: 13px; margin-top: 10px; color: #d32f2f; font-weight: bold; }
        .palanquin-icon { font-size: 30px; text-align: center; line-height: 40px; }
        hr { border: 0; border-top: 1px solid #eee; margin: 10px 0; }
    </style>
</head>
<body>

<div class="control-panel">
    <b style="color:#d32f2f; font-size: 16px;">🏮 浯島城隍巡安</b>
    <button class="btn-user" onclick="locateUser()">📍 我的位置</button>
    <hr>
    <p style="font-size: 12px; color: #888; margin: 0;">管理人員專用：</p>
    <button id="adminBtn" class="btn-admin" onclick="toggleAdminMode()">📡 開啟神轎定位</button>
    <div id="statusText" class="status">系統初始化中...</div>
</div>

<div id="map"></div>

<script>
    // --- 1. 配置與變數 ---
    const firebaseConfig = {
        apiKey: "AIzaSyAWtgeRkdjtaHdtnoKdgOMQ_PTBMpwmsLI",
        authDomain: "kinmen-location.firebaseapp.com",
        databaseURL: "https://kinmen-location-default-rtdb.firebaseio.com",
        projectId: "kinmen-location",
        storageBucket: "kinmen-location.firebasestorage.app",
        messagingSenderId: "853976014096",
        appId: "1:853976014096:web:f119c60182766512651995",
        measurementId: "G-J8NL3GC45R"
    };

    let map, palanquinMarker, userMarker, userCircle;
    let isAdmin = false, watchId = null;
    let db;

    // --- 2. 核心初始化函數 ---
    function init() {
        const status = document.getElementById('statusText');
        
        // A. 先初始化地圖 (不管 Firebase 有沒有通，地圖一定要先出來)
        try {
            if (typeof L === 'undefined') throw new Error("Leaflet 未載入");
            
            map = L.map('map', { zoomControl: false }).setView([24.4357, 118.3168], 16);
            L.control.zoom({ position: 'bottomright' }).addTo(map);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            const palanquinIcon = L.divIcon({ html: '🏮', className: 'palanquin-icon', iconSize: [40, 40] });
            palanquinMarker = L.marker([24.4357, 118.3168], { icon: palanquinIcon }).addTo(map);
            
            console.log("地圖載入成功");
        } catch (e) {
            status.innerText = "❌ 地圖載入失敗: " + e.message;
            return;
        }

        // B. 初始化 Firebase
        try {
            if (typeof firebase === 'undefined') throw new Error("Firebase SDK 未載入");
            
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            
            // 監聽連線
            db.ref(".info/connected").on("value", (snap) => {
                if (snap.val() === true) {
                    status.innerText = "✅ 系統已連線";
                    status.style.color = "green";
                    startListening();
                } else {
                    status.innerText = "⚠️ 正在連線資料庫...";
                    status.style.color = "#FF9800";
                }
            });
        } catch (e) {
            status.innerText = "❌ Firebase 錯誤: " + e.message;
            console.error(e);
        }
    }

    // --- 3. 功能邏輯 ---
    function startListening() {
        db.ref('palanquin/location').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.lat) {
                palanquinMarker.setLatLng([data.lat, data.lng]);
                document.getElementById('statusText').innerText = "最後更新: " + new Date(data.timestamp).toLocaleTimeString();
            }
        });
    }

    function locateUser() {
        map.locate({setView: true, maxZoom: 17});
    }

    map.on('locationfound', (e) => {
        if (userMarker) {
            userMarker.setLatLng(e.latlng);
            userCircle.setLatLng(e.latlng).setRadius(e.accuracy);
        } else {
            userMarker = L.marker(e.latlng).addTo(map).bindPopup("你在這裡");
            userCircle = L.circle(e.latlng, e.accuracy).addTo(map);
        }
    });

    function toggleAdminMode() {
        if (!isAdmin) {
            if (confirm("開啟神轎發送模式？")) {
                isAdmin = true;
                document.getElementById('adminBtn').innerText = "🛑 停止發送";
                document.getElementById('adminBtn').style.background = "#f44336";
                watchId = navigator.geolocation.watchPosition((pos) => {
                    const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude, timestamp: Date.now() };
                    db.ref('palanquin/location').set(loc);
                }, (err) => alert(err.message), { enableHighAccuracy: true });
            }
        } else {
            isAdmin = false;
            document.getElementById('adminBtn').innerText = "📡 開啟神轎定位";
            document.getElementById('adminBtn').style.background = "#FF9800";
            navigator.geolocation.clearWatch(watchId);
        }
    }

    // 啟動初始化
    init();
</script>

</body>
</html>
