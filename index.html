<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 金門迎城隍 - 即時定位系統 (警力部署版)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        .control-panel {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(255,255,255,0.98); border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            width: 280px; transition: all 0.3s ease;
            max-height: 90vh; display: flex; flex-direction: column;
        }

        .control-panel.minimized { width: 140px; height: 40px; overflow: hidden; }
        .panel-header {
            padding: 10px; display: flex; justify-content: space-between; align-items: center;
            background: #d32f2f; color: white; border-radius: 12px 12px 0 0; cursor: pointer;
        }

        .panel-content { padding: 10px; overflow-y: auto; }
        .control-panel.minimized .panel-content { display: none; }

        button { width: 100%; padding: 8px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; margin-bottom: 5px; }
        .btn-toggle { background: none; color: white; width: auto; margin: 0; padding: 2px 5px; font-size: 12px; border: 1px solid white; }
        .btn-admin { background: #FF9800; color: white; font-size: 13px; }
        .btn-tail { background: #4CAF50; color: white; margin-top: 5px; }
        
        .live-clock { background: #b71c1c; color: #fff; text-align: center; font-size: 14px; padding: 4px 0; font-family: monospace; letter-spacing: 1px; }
        .status-info { font-size: 11px; margin: 5px 0; text-align: center; color: #666; font-weight: bold; }
        .dist-info { font-size: 13px; color: #d32f2f; text-align: center; margin-bottom: 5px; }

        .report-section { margin-top: 12px; padding-top: 8px; border-top: 2px solid #eee; }
        .report-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .report-title { font-size: 14px; font-weight: bold; color: #333; }
        .btn-reset { width: auto; padding: 2px 8px; font-size: 11px; background: #f5f5f5; color: #999; border: 1px solid #ddd; margin: 0; }
        
        .btn-clear-path { background: #607D8B; color: white; margin-top: 10px; font-size: 12px; }
        
        .btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .report-item { display: flex; flex-direction: column; align-items: center; margin-bottom: 6px; }
        .btn-report { padding: 8px 2px; font-size: 12px; background: #fdfdfd; border: 1px solid #ddd; width: 100%; margin: 0; }
        .btn-arrived { border-left: 4px solid #4CAF50; }
        .btn-left { border-left: 4px solid #f44336; }
        .time-label { font-size: 16px; color: #d32f2f; font-weight: 900; margin-top: 3px; font-family: Arial; height: 20px; }

        /* 圖示樣式 */
        .marker-icon { display: flex; justify-content: center; align-items: center; width: 40px; height: 40px; background: white; border: 2px solid #d32f2f; border-radius: 50%; font-size: 24px; box-shadow: 0 0 10px rgba(0,0,0,0.3); }
        .god-marker { border-color: #d32f2f; animation: pulse 2s infinite; }
        .tail-marker { border-color: #4CAF50; font-size: 20px; }
        .police-marker { background: none; border: none; box-shadow: none; font-size: 22px; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0px rgba(211, 47, 47, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(211, 47, 47, 0); }
            100% { box-shadow: 0 0 0 0px rgba(211, 47, 47, 0); }
        }
    </style>
</head>
<body>

<div id="mainPanel" class="control-panel">
    <div class="panel-header" onclick="togglePanel()">
        <span style="font-size: 14px; font-weight: bold;">👮‍♂️ 2026年金門迎城隍勤務</span>
        <button class="btn-toggle" id="toggleBtn">收合</button>
    </div>
    <div id="liveClock" class="live-clock">----/--/-- --:--:--</div>
    
    <div class="panel-content">
        <button id="tailBtn" class="btn-tail" onclick="toggleTailMode()">🚩 隊伍尾端回報</button>
        <button id="adminBtn" class="btn-admin" onclick="toggleAdminMode()">📡 神轎位置回報</button>
        
        <div id="statusText" class="status-info">等待數據中...</div>
        <div id="distanceText" class="dist-info">隊伍長度: -- 公尺</div>

        <div class="report-section">
            <div class="report-header">
                <span class="report-title">📌 長官蒞臨時間</span>
                <button class="btn-reset" onclick="resetSection('蒞')">清空</button>
            </div>
            <div class="btn-grid" id="arrivalGrid"></div>
        </div>

        <div class="report-section">
            <div class="report-header">
                <span class="report-title">🚶 長官離轄時間</span>
                <button class="btn-reset" onclick="resetSection('離')">清空</button>
            </div>
            <div class="btn-grid" id="departureGrid"></div>
        </div>

        <button class="btn-clear-path" onclick="clearRoutePath()">🧹 清除今日行走軌跡</button>
    </div>
</div>

<div id="map"></div>

<script>
    // 1. 繞境路線座標
    const rawCoords = [[118.31598185256757,24.432490591580518],[118.31588557768761,24.432564156830114],[118.31578930280764,24.43263772207971],[118.31569302792768,24.432711287329308],[118.31559675304771,24.432784852578905],[118.31536996766096,24.43270930151033],[118.3151431822742,24.432633750441752],[118.31500769258054,24.432759653379634],[118.31466096651604,24.43263660189679],[118.31443911614434,24.433037403086345],[118.3147095189529,24.433315152180626],[118.31482230303706,24.4331652943072],[118.31496966114895,24.433065800804854],[118.31512375737375,24.433054902114108],[118.31520179073232,24.433151027789364],[118.3154965906545,24.43352347996357],[118.31594351631071,24.433958887263998],[118.31626267614791,24.43352987765745],[118.31655393496982,24.433097557369628],[118.31691434185353,24.432765965880265],[118.31697127011716,24.43274628080927],[118.31788258981794,24.433342829163067],[118.31745798382029,24.433691465910357],[118.31703337782264,24.434040102657647],[118.31660877182499,24.434388739404937],[118.31618416582734,24.434737376152228],[118.31645767473047,24.435039670999142],[118.3167311836336,24.435341965846057],[118.31686793808518,24.435493113269516],[118.31700469253674,24.43564426069297],[118.31727820143988,24.435946555539886],[118.31755081731876,24.436234458320754],[118.31782343319765,24.436522361101623],[118.31809604907653,24.436810263882492],[118.31836866495541,24.43709816666336],[118.31853679462711,24.43675394266984],[118.31870492429879,24.43640971867632],[118.31904118364216,24.435721270689278],[118.319125248478,24.435549158692517],[118.31920931331385,24.435377046695756],[118.3192933781497,24.435204934698994],[118.31933541056762,24.435118878700614],[118.31937744298553,24.435032822702237],[118.31946150782136,24.43486071070548],[118.3195455726572,24.434688598708718],[118.31962963749305,24.434516486711956],[118.3197137023289,24.434344374715195],[118.3195203456307,24.43424575589621],[118.31932698893252,24.434147137077225],[118.31913363223433,24.43404851825824],[118.31894027553614,24.433949899439256],[118.31913430451428,24.433796122716718],[118.31932833349242,24.43364234599418],[118.3194253479815,24.43356545763291],[118.31952236247056,24.433488569271642],[118.31961937695964,24.433411680910375],[118.31971639144871,24.433342549104],[118.31963957200634,24.43324362048596],[118.31956275256397,24.433152448422817],[118.319414596218,24.43308000848127],[118.31926369623466,24.432916393871572],[118.31911279625132,24.432752779261875],[118.31898078420377,24.43261512428537],[118.31888233082213,24.432453026559486],[118.31902499989731,24.432376214744817],[118.31916766897248,24.43229940293015],[118.31945300712283,24.43214577930081],[118.31898906406451,24.431461470850223],[118.31939469659403,24.431318660628037],[118.31952697591862,24.43134182115122],[118.31974602330789,24.431225133433223],[118.31993398922492,24.431207490058583],[118.32001539188622,24.431383510082313],[118.32053433385045,24.43128623588956],[118.32051837650684,24.431040354509825],[118.32058012284739,24.430836920782255],[118.32037916002804,24.430748910388417],[118.32017819720869,24.430660899994578],[118.3201120575464,24.430864713515746],[118.31992635772542,24.43084850108758],[118.31974065790445,24.430832288659417],[118.3196643429095,24.430693324894975],[118.31953206358492,24.430596050168774],[118.31941504725938,24.430609946562825],[118.31934890759709,24.430549728844227],[118.319058910617,24.4308623970673],[118.31876891363692,24.431175065290375],[118.31863663431233,24.43127697163495],[118.31850435498774,24.431378877979526],[118.3184534783245,24.43160585081519],[118.31829576066895,24.43172628515768],[118.31813804301339,24.43184671950017],[118.3178877235735,24.43198894567977],[118.31763740413362,24.432131171859368],[118.31732705648821,24.432425307949615],[118.3170167088428,24.43271944403986],[118.31686407885294,24.432663859371928],[118.31671144886309,24.432608274703995],[118.31654452795672,24.432401894955227],[118.31622219968364,24.43220258970136],[118.31641636387633,24.431950520588117],[118.3165328903145,24.431868698183848],[118.31664941675268,24.43178687577958],[118.3167126484046,24.431668091129737],[118.31679142079281,24.43162005219267],[118.3169494575479,24.431540810886204],[118.317107494303,24.43146156957974],[118.31725865989534,24.431367731061684],[118.31739658313188,24.43127389254363],[118.31725407911978,24.431002802998535],[118.31759305650871,24.430881855168423],[118.31754037759075,24.430683750556057],[118.31748769867278,24.43048564594369],[118.31739150238673,24.43033550308607],[118.31729530610068,24.43018536022845],[118.3170158787936,24.430195786826467],[118.31673645148652,24.430206213424484],[118.31645702417944,24.4302166400225],[118.31617759687236,24.430227066620517],[118.31598750392419,24.430235800979602],[118.31579741097602,24.430244535338687],[118.3155729529764,24.43026538852495],[118.31534849497677,24.430286241711215],[118.31494080594052,24.43040301948089],[118.31462931320476,24.43050728525533],[118.31466137863231,24.43074084027623],[118.31467054018339,24.430957712409395],[118.31464305553021,24.43105363650318],[118.31461557087931,24.431228802051393],[118.31451937459212,24.43123714326191],[118.31451937459212,24.431470696932365],[118.31457434390052,24.431516567278976],[118.31465017094715,24.431563458418516],[118.31472599799378,24.431590941588198],[118.31476783724054,24.431678359603197],[118.3147723721616,24.431765777618196],[118.31499045305878,24.431856439533163],[118.31532780912232,24.431987719424924],[118.3153323898967,24.432046107535584],[118.31571436681509,24.43223835283173],[118.31585688869501,24.432319280087434],[118.31598345763285,24.432427642248953],[118.31605615242978,24.432492358630483]];
    const routePoints = rawCoords.map(p => [p[1], p[0]]);

    // 2. KML 警力點位數據 
    const policePoints = [
        [24.434223171018658, 118.31576583942251],
        [24.43349828092481, 118.31477924612255],
        [24.433000615306227, 118.31433795958651],
        [24.43472891673035, 118.31615454614723],
        [24.43332709997314, 118.31778964343579],
        [24.432762647232522, 118.31697209479148],
        [24.43223540887456, 118.31628399134797],
        [24.432384276399247, 118.31592972026937],
        [24.43278745839534, 118.31554138466237],
        [24.431861510192036, 118.31810955831077]
    ];

    // 3. 地圖初始化
    const map = L.map('map', { zoomControl: false }).setView([24.4335, 118.3165], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 繞境底線與已行走軌跡
    L.polyline(routePoints, { color: "#d32f2f", weight: 6, opacity: 0.3 }).addTo(map);
    const passedPath = L.polyline([], { color: "#555", weight: 4, dashArray: "5, 8", opacity: 0.8 }).addTo(map);

    // 圖示定義
    const godIcon = L.divIcon({ html: '<div class="marker-icon god-marker">👨‍⚖️</div>', className: '', iconSize: [40, 40], iconAnchor: [20, 20] });
    const tailIcon = L.divIcon({ html: '<div class="marker-icon tail-marker">🚩</div>', className: '', iconSize: [36, 36], iconAnchor: [18, 18] });
    const policeIcon = L.divIcon({ html: '<div class="police-marker">👮‍♂️</div>', className: '', iconSize: [30, 30], iconAnchor: [15, 15] });
    
    // 建立警察標記圖層
    const policeLayer = L.layerGroup().addTo(map);
    policePoints.forEach(pos => {
        L.marker(pos, { icon: policeIcon }).addTo(policeLayer);
    });

    const palanquinMarker = L.marker(routePoints[0], { icon: godIcon }).addTo(map);
    const tailMarker = L.marker([0,0], { icon: tailIcon, opacity: 0 }).addTo(map);

    function togglePanel() {
        const panel = document.getElementById('mainPanel');
        const btn = document.getElementById('toggleBtn');
        panel.classList.toggle('minimized');
        btn.innerText = panel.classList.contains('minimized') ? "展開" : "收合";
    }

    // 4. Firebase 初始化
    const firebaseConfig = {
        apiKey: "AIzaSyAWtgeRkdjtaHdtnoKdgOMQ_PTBMpwmsLI", 
        databaseURL: "https://kinmen-location-default-rtdb.firebaseio.com",
        projectId: "kinmen-location"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 5. 定位邏輯
    let godPos = null;
    let tailPos = null;

    function calculateDistance() {
        if (godPos && tailPos) {
            const d = L.latLng(godPos).distanceTo(L.latLng(tailPos));
            document.getElementById('distanceText').innerText = `隊伍長度: ${Math.round(d)} 公尺`;
        }
    }

    function syncPalanquin(lat, lng) {
        godPos = [lat, lng];
        const currentPos = L.latLng(lat, lng);
        let minDist = Infinity, closestIdx = 0;
        routePoints.forEach((p, i) => {
            let d = L.latLng(p).distanceTo(currentPos);
            if(d < minDist) { minDist = d; closestIdx = i; }
        });
        passedPath.setLatLngs(routePoints.slice(0, closestIdx + 1));
        palanquinMarker.setLatLng(routePoints[closestIdx]);
        calculateDistance();
    }

    db.ref('palanquin/location').on('value', (s) => {
        const d = s.val();
        if(d) {
            syncPalanquin(d.lat, d.lng);
            document.getElementById('statusText').innerText = "最後更新: " + new Date(d.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
    });

    db.ref('palanquin/tail').on('value', (s) => {
        const d = s.val();
        if(d) {
            tailPos = [d.lat, d.lng];
            tailMarker.setLatLng(tailPos).setOpacity(1);
            calculateDistance();
        }
    });

    db.ref('system/pathReset').on('value', () => { passedPath.setLatLngs([]); });

    function clearRoutePath() {
        if (confirm("確定要清除目前地圖上顯示的灰色行走軌跡嗎？")) {
            db.ref('system/pathReset').set(Date.now());
        }
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('liveClock').innerText = `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    let isAdmin = false, watchId = null;
    function toggleAdminMode() {
        if (!isAdmin) {
            if (confirm("啟動「神轎頭」自動發送定位？")) {
                isAdmin = true;
                document.getElementById('adminBtn').innerText = "🛑 停止發送(頭)";
                document.getElementById('adminBtn').style.background = "#f44336";
                watchId = navigator.geolocation.watchPosition((p) => {
                    db.ref('palanquin/location').set({ lat: p.coords.latitude, lng: p.coords.longitude, timestamp: Date.now() });
                }, null, { enableHighAccuracy: true });
            }
        } else {
            isAdmin = false;
            document.getElementById('adminBtn').innerText = "📡 神轎位置回報";
            document.getElementById('adminBtn').style.background = "#FF9800";
            navigator.geolocation.clearWatch(watchId);
        }
    }

    let isTail = false, tailWatchId = null;
    function toggleTailMode() {
        if (!isTail) {
            if (confirm("啟動「隊伍尾端」自動定位回報？")) {
                isTail = true;
                document.getElementById('tailBtn').innerText = "🛑 停止回報(尾)";
                document.getElementById('tailBtn').style.background = "#f44336";
                tailWatchId = navigator.geolocation.watchPosition((p) => {
                    db.ref('palanquin/tail').set({ lat: p.coords.latitude, lng: p.coords.longitude, timestamp: Date.now() });
                }, null, { enableHighAccuracy: true });
            }
        } else {
            isTail = false;
            document.getElementById('tailBtn').innerText = "🚩 隊伍尾端回報";
            document.getElementById('tailBtn').style.background = "#4CAF50";
            navigator.geolocation.clearWatch(tailWatchId);
        }
    }

    // 6. 長官回報系統
    const officials = ['縣長', '李副縣長', '陳副縣長', '議長', '副議長'];
    function initGrids() {
        const arrivalGrid = document.getElementById('arrivalGrid');
        const departureGrid = document.getElementById('departureGrid');
        officials.forEach(p => {
            arrivalGrid.innerHTML += `<div class="report-item"><button class="btn-report btn-arrived" onclick="reportStatus('${p}', '蒞轄')">${p.replace('副縣長','副縣')}</button><span id="time-${p}-蒞" class="time-label">--:--</span></div>`;
            departureGrid.innerHTML += `<div class="report-item"><button class="btn-report btn-left" onclick="reportStatus('${p}', '離轄')">${p.replace('副縣長','副縣')}</button><span id="time-${p}-離" class="time-label">--:--</span></div>`;
        });
    }
    initGrids();

    function reportStatus(person, action) {
        if (!confirm(`確認更新 ${person} 的${action}時間？`)) return;
        db.ref(`officials/${person}/${action === '蒞轄' ? '蒞' : '離'}`).set({ timestamp: Date.now() });
    }

    function resetSection(key) {
        if (!confirm(`確定要清空嗎？`)) return;
        db.ref('officials').once('value', (s) => {
            const data = s.val(); if(!data) return;
            Object.keys(data).forEach(p => db.ref(`officials/${p}/${key}`).remove());
        });
    }

    db.ref('officials').on('value', (s) => {
        const d = s.val() || {};
        officials.forEach(p => {
            ['蒞', '離'].forEach(k => {
                const el = document.getElementById(`time-${p}-${k}`);
                if (d[p] && d[p][k]) {
                    const t = new Date(d[p][k].timestamp);
                    el.innerText = `${String(t.getHours()).padStart(2, '0')}:${String(t.getMinutes()).padStart(2, '0')}`;
                } else { el.innerText = "--:--"; }
            });
        });
    });
</script>
</body>
</html>
