    <title>金門迎城隍 - 神轎即時定位</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />

    <style>

        .control-panel {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(255,255,255,0.95); padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 180px;
        }
        button {
            width: 100%; padding: 12px; margin-top: 8px; cursor: pointer;
            border: none; border-radius: 6px; font-weight: bold; font-size: 14px;
        }
        .btn-user { background: #2196F3; color: white; }
        .btn-admin { background: #FF9800; color: white; }
        .status { font-size: 12px; margin-top: 10px; color: #666; font-weight: bold; }
        .palanquin-icon { font-size: 30px; text-align: center; line-height: 40px; }
        hr { border: 0; border-top: 1px solid #eee; margin: 10px 0; }
    </style>
</head>
