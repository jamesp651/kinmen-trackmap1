<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 金門迎城隍 - 勤務與警力跳崗指揮系統</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        /* 控制面板與原有樣式 */
        .control-panel {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(255,255,255,0.98); border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            width: 300px; transition: all 0.3s ease;
            max-height: 90vh; display: flex; flex-direction: column;
        }
        .control-panel.minimized { width: 140px; height: 40px; overflow: hidden; }
        .panel-header {
            padding: 10px; display: flex; justify-content: space-between; align-items: center;
            background: #d32f2f; color: white; border-radius: 12px 12px 0 0; cursor: pointer;
        }
        .panel-content { padding: 10px; overflow-y: auto; }
        .live-clock { background: #b71c1c; color: #fff; text-align: center; font-size: 14px; padding: 4px 0; font-family: monospace; }
        
        /* 指揮統計面板 */
        .stats-panel {
            background: #f8f9fa; border: 1px solid #ddd; border-radius: 8px;
            padding: 8px; margin-bottom: 10px; font-size: 12px;
        }
        .stats-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .stats-val { font-weight: bold; color: #1a237e; }

        /* 按鈕樣式 */
        button { width: 100%; padding: 8px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; margin-bottom: 5px; color: white; }
        .btn-stage1 { background: #3f51b5; } /* 第一階段：藍 */
        .btn-stage2 { background: #2e7d32; } /* 第二階段：綠 */
        .btn-stage3 { background: #ed6c00; } /* 第三階段：橘 */
        .btn-stage4 { background: #c2185b; } /* 第四階段：桃紅 */
        
        .btn-admin { background: #FF9800; }
        .btn-tail { background: #4CAF50; }
        .btn-reset { background: #f5f5f5; color: #999; border: 1px solid #ddd; width: auto; padding: 2px 8px; font-size: 11px; }

        .report-section { margin-top: 12px; padding-top: 8px; border-top: 2px solid #eee; }
        .btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .time-label { font-size: 14px; color: #d32f2f; font-weight: 900; }

        /* 警力 Marker 動畫樣式 */
        .police-marker {
            width: 20px; height: 20px; border-radius: 50%; border: 2px solid #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: bold; color: white;
            transition: all 2s ease-in-out; /* 平滑移動核心 */
        }
        .p-s1 { background: #3f51b5; }
        .p-s2 { background: #2e7d32; }
        .p-s3 { background: #ed6c00; }
        .p-s4 { background: #c2185b; }

        .marker-icon { display: flex; justify-content: center; align-items: center; width: 40px; height: 40px; background: white; border: 2px solid #d32f2f; border-radius: 50%; font-size: 24px; }
        .god-marker { border-color: #d32f2f; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(211,47,47,0.7); } 70% { box-shadow: 0 0 0 10px rgba(211,47,47,0); } 100% { box-shadow: 0 0 0 0px rgba(211,47,47,0); } }
    </style>
</head>
<body>

<div id="mainPanel" class="control-panel">
    <div class="panel-header" onclick="togglePanel()">
        <span style="font-size: 14px; font-weight: bold;">👮‍♂️ 2026年迎城隍指揮調度</span>
        <button style="background:none; border:1px solid white; width:auto; padding:2px 5px;" id="toggleBtn">收合</button>
    </div>
    <div id="liveClock" class="live-clock">----/--/-- --:--:--</div>
    
    <div class="panel-content">
        <div class="stats-panel">
            <div class="stats-row"><span>總部署警力：</span><span class="stats-val">100 名</span></div>
            <div class="stats-row"><span>當前任務階段：</span><span id="currentStageTxt" class="stats-val">第 1 階段</span></div>
            <div id="statusText" style="font-size:11px; color:#666; text-align:center;">等待數據中...</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px;">
            <button class="btn-stage1" onclick="triggerDeployment(1)">第1階段部署</button>
            <button class="btn-stage2" onclick="triggerDeployment(2)">第2階段跳崗</button>
            <button class="btn-stage3" onclick="triggerDeployment(3)">第3階段跳崗</button>
            <button class="btn-stage4" onclick="triggerDeployment(4)">第4階段跳崗</button>
        </div>

        <button id="adminBtn" class="btn-admin" onclick="toggleAdminMode()">📡 神轎位置回報(頭)</button>
        <button id="tailBtn" class="btn-tail" onclick="toggleTailMode()">🚩 隊伍尾端回報(尾)</button>

        <div class="report-section">
            <div style="display:flex; justify-content:space-between;">
                <span style="font-weight:bold; font-size:14px;">📌 長官蒞/離時間</span>
                <button class="btn-reset" onclick="resetSection()">清空</button>
            </div>
            <div class="btn-grid" id="officerGrid"></div>
        </div>
    </div>
</div>

<div id="map"></div>

<script>
    // 1. 繞境路線座標 (保留您提供的原始路線)
    const rawCoords = [[118.31598,24.43249],[118.31588,24.43256],[118.31578,24.43263],[118.31569,24.43271],[118.31559,24.43278],[118.31536,24.43270],[118.31514,24.43263],[118.31500,24.43275],[118.31466,24.43263],[118.31443,24.43303],[118.31470,24.43331],[118.31482,24.43316],[118.31496,24.43306],[118.31512,24.43305],[118.31520,24.43315],[118.31549,24.43352],[118.31594,24.43395],[118.31626,24.43352],[118.31655,24.43309],[118.31691,24.43276],[118.31697,24.43274],[118.31788,24.43342],[118.31745,24.43369],[118.31703,24.43404],[118.31660,24.43438],[118.31618,24.43473],[118.31645,24.43503],[118.31673,24.43534],[118.31686,24.43549],[118.31700,24.43564],[118.31727,24.43594],[118.31755,24.43623],[118.31782,24.43652],[118.31809,24.43681],[118.31836,24.43709],[118.31853,24.43675],[118.31870,24.43640],[118.31904,24.43572],[118.31912,24.43554],[118.31920,24.43537],[118.31929,24.43520],[118.31933,24.43511],[118.31937,24.43503],[118.31946,24.43486],[118.31954,24.43468],[118.31962,24.43451],[118.31971,24.43434],[118.31952,24.43424],[118.31932,24.43414],[118.31913,24.43404],[118.31894,24.43394],[118.31913,24.43379],[118.31932,24.43364],[118.31942,24.43356],[118.31952,24.43348],[118.31961,24.43341],[118.31971,24.43333],[118.31963,24.43324],[118.31956,24.43315],[118.31941,24.43308],[118.31926,24.43291],[118.31911,24.43275],[118.31898,24.43261],[118.31888,24.43245],[118.31902,24.43237],[118.31916,24.43229],[118.31945,24.43214],[118.31898,24.41461],[118.31939,24.31318]];
    const routePoints = rawCoords.map(p => [p[1], p[0]]);

    // 2. 地圖初始化
    const map = L.map('map', { zoomControl: false }).setView([24.4335, 118.3165], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.polyline(routePoints, { color: "#d32f2f", weight: 6, opacity: 0.2 }).addTo(map);

    // 3. 模擬 100 位警力初始化
    let policeMarkers = [];
    const stages = {
        1: { color: 'p-s1', count: 100, label: '初始部署' },
        2: { color: 'p-s2', count: 35, label: '西門跳崗' },
        3: { color: 'p-s3', count: 35, label: '南門跳崗' },
        4: { color: 'p-s4', count: 30, label: '外圍疏導' }
    };

    function initPolice() {
        for (let i = 1; i <= 100; i++) {
            // 隨機在路徑點周圍分布初始位置
            let randomIdx = Math.floor(Math.random() * 20);
            let pos = [routePoints[randomIdx][0] + (Math.random()-0.5)*0.001, routePoints[randomIdx][1] + (Math.random()-0.5)*0.001];
            
            let icon = L.divIcon({
                className: '',
                html: `<div id="p-icon-${i}" class="police-marker p-s1">${i}</div>`,
                iconSize: [20, 20]
            });
            let marker = L.marker(pos, { icon: icon }).addTo(map);
            policeMarkers.push(marker);
        }
    }

    // 執行跳崗平滑動畫
    function triggerDeployment(stage) {
        document.getElementById('currentStageTxt').innerText = `第 ${stage} 階段 (${stages[stage].label})`;
        
        policeMarkers.forEach((marker, index) => {
            let id = index + 1;
            let iconEl = document.getElementById(`p-icon-${id}`);
            
            // 根據不同階段，分配部分警力移動到新位置
            if (stage === 2 && id <= 35) { // 前35人移動
                moveMarker(marker, iconEl, routePoints[25 + (id%10)], 'p-s2');
            } else if (stage === 3 && id > 35 && id <= 70) { // 中間35人移動
                moveMarker(marker, iconEl, routePoints[45 + (id%10)], 'p-s3');
            } else if (stage === 4 && id > 70) { // 最後30人移動
                moveMarker(marker, iconEl, routePoints[60 + (id%10)], 'p-s4');
            }
        });
    }

    function moveMarker(marker, el, newPos, colorClass) {
        marker.setLatLng(newPos); // 觸發 CSS transition
        el.className = `police-marker ${colorClass}`;
        // 隨機延遲增加擬真感
        el.style.transitionDelay = `${Math.random() * 0.5}s`;
    }

    // 4. 原有功能：Firebase 與回報系統
    const firebaseConfig = { apiKey: "AIzaSyAWtgeRkdjtaHdtnoKdgOMQ_PTBMpwmsLI", databaseURL: "https://kinmen-location-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const godIcon = L.divIcon({ html: '<div class="marker-icon god-marker">👨‍⚖️</div>', className: '', iconSize: [40, 40], iconAnchor: [20, 20] });
    const palanquinMarker = L.marker(routePoints[0], { icon: godIcon }).addTo(map);

    db.ref('palanquin/location').on('value', (s) => {
        const d = s.val();
        if(d) {
            palanquinMarker.setLatLng([d.lat, d.lng]);
            document.getElementById('statusText').innerText = "最後更新: " + new Date(d.timestamp).toLocaleTimeString();
        }
    });

    // 長官回報介面
    const officials = ['縣長', '李副縣長', '議長'];
    function initOfficerGrid() {
        const grid = document.getElementById('officerGrid');
        officials.forEach(p => {
            grid.innerHTML += `
                <div style="text-align:center; padding:5px; border:1px solid #eee;">
                    <span style="font-size:12px;">${p}</span><br>
                    <button class="btn-reset" style="background:#4CAF50;color:white;width:100%" onclick="report('${p}','蒞')">蒞</button>
                    <span id="t-${p}-蒞" class="time-label">--:--</span>
                </div>
            `;
        });
    }

    function report(p, type) { if(confirm(`更新 ${p} 時間?`)) db.ref(`officials/${p}/${type}`).set({timestamp: Date.now()}); }
    
    // 定時器與UI邏輯
    function togglePanel() { document.getElementById('mainPanel').classList.toggle('minimized'); }
    setInterval(() => {
        const n = new Date();
        document.getElementById('liveClock').innerText = n.toLocaleString();
    }, 1000);

    // 初始化執行
    initPolice();
    initOfficerGrid();
    
    // 其他原有神轎/隊尾發送邏輯 (toggleAdminMode / toggleTailMode) 簡化保留
    let watchId = null;
    function toggleAdminMode() {
        if (!watchId) {
            watchId = navigator.geolocation.watchPosition(p => {
                db.ref('palanquin/location').set({ lat: p.coords.latitude, lng: p.coords.longitude, timestamp: Date.now() });
            });
            document.getElementById('adminBtn').style.background = "#f44336";
        } else {
            navigator.geolocation.clearWatch(watchId); watchId = null;
            document.getElementById('adminBtn').style.background = "#FF9800";
        }
    }
</script>
</body>
</html>
