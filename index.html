<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <style>
        /* ... 既有樣式 ... */
        .palanquin-icon img {
            width: 40px;
            height: 40px;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
        }
        /* 調整控制面板標題 */
        .panel-title { display: flex; align-items: center; gap: 5px; color:#d32f2f; font-size: 18px; font-weight: bold; }
        .panel-title img { width: 24px; height: 24px; }
    </style>
</head>
<body>

<div class="control-panel">
    <div class="panel-title">
        <img src="https://i.imgur.com/your-god-emoji-link.png" alt="icon"> 
        2026金門迎城隍定位
    </div>
    <button class="btn-user" onclick="locateUser()">📍 我的位置</button>
    <hr style="border:0; border-top:1px solid #ddd; margin:10px 0;">
    <button id="adminBtn" class="btn-admin" onclick="toggleAdminMode()">📡 開啟神轎定位</button>
    <div id="statusText" class="status">正在同步繞境路線...</div>
</div>

<div id="map"></div>

<script>
    // 1. 繞境座標資料 (保持不變)
    const rawCoords = geojsonData.features[0].geometry.coordinates.map(c => [c[1], c[0]]);

    // 2. 初始化地圖
    const map = L.map('map', { zoomControl: false }).setView([24.433, 118.317], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // [底層] 完整預定路線：紅色粗線
    L.polyline(rawCoords, {
        color: "#d32f2f",
        weight: 6,
        opacity: 0.4 // 降低透明度，讓上層虛線更明顯
    }).addTo(map);

    // [中層] 已行經路線：灰色細虛線
    // 這裡我們初始化一個空的 Polyline
    const passedPath = L.polyline([], {
        color: "#555",
        weight: 4,
        dashArray: "5, 10", // 設定虛線樣式
        opacity: 0.8
    }).addTo(map);

    // [頂層] 城隍爺自定義圖示
    const godIcon = L.divIcon({
        html: `<div class="palanquin-icon"><img src="https://i.imgur.com/your-god-emoji-link.png"></div>`,
        className: 'custom-div-icon',
        iconSize: [40, 40],
        iconAnchor: [20, 20]
    });

    const palanquinMarker = L.marker(rawCoords[0], { icon: godIcon }).addTo(map).bindPopup("<b>城隍爺在此</b>");

    // 3. 邏輯：如何判斷已行經路徑？
    // 我們需要將神轎當前位置與原始路徑做比對，找到路徑上最接近的點
    function updatePassedPath(currentLatLng) {
        let minDistance = Infinity;
        let closestIndex = 0;

        // 尋找距離神轎最近的路徑節點索引
        rawCoords.forEach((coord, index) => {
            const dist = L.latLng(coord).distanceTo(currentLatLng);
            if (dist < minDistance) {
                minDistance = dist;
                closestIndex = index;
            }
        });

        // 擷取從起點到該索引的所有座標
        const newPath = rawCoords.slice(0, closestIndex + 1);
        // 如果目前位置不在節點上，把當前精準位置也補進去最後一個點
        newPath.push([currentLatLng.lat, currentLatLng.lng]);
        
        passedPath.setLatLngs(newPath);
    }

    // 4. Firebase 監聽 (更新時觸發路徑計算)
    const firebaseConfig = { /* ... 您的設定 ... */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('palanquin/location').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data && data.lat) {
            const currentPos = L.latLng(data.lat, data.lng);
            palanquinMarker.setLatLng(currentPos);
            
            // 觸發更新虛線軌跡
            updatePassedPath(currentPos);

            document.getElementById('statusText').innerText = "最後更新: " + new Date(data.timestamp).toLocaleTimeString();
            document.getElementById('statusText').style.color = "green";
        }
    });

    // ... 其餘定位與管理員功能保持不變 ...
</script>
</body>
</html>
